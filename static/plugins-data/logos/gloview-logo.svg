<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="glow-bg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>

    <filter id="glow-element" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="neonCyan" gradientUnits="userSpaceOnUse" x1="24" y1="30" x2="216" y2="212">
      <stop offset="0%" stop-color="#80FFFF" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#0055FF" />
    </linearGradient>
  </defs>

  <ellipse cx="96" cy="150" rx="70" ry="55" fill="#00E5FF" filter="url(#glow-bg)" opacity="0.30" />
  <ellipse cx="150" cy="70" rx="55" ry="35" fill="#0055FF" filter="url(#glow-bg)" opacity="0.35" />

  <g filter="url(#glow-element)" fill="none" stroke="url(#neonCyan)" stroke-linecap="round" stroke-linejoin="round">

    <rect x="24" y="30" width="192" height="48" rx="11" stroke-width="7" />
    <line x1="40" y1="54" x2="116" y2="54" stroke-width="7" />
    <line x1="128" y1="54" x2="144" y2="54" stroke-width="7" />
    <line x1="156" y1="54" x2="172" y2="54" stroke-width="7" />
    <!-- trailing "+" (new workspace) -->
    <line x1="184" y1="54" x2="200" y2="54" stroke-width="7" />
    <line x1="192" y1="46" x2="192" y2="62" stroke-width="7" />

    <rect x="24" y="92" width="118" height="120" rx="11" stroke-width="7" />

    <!-- side previews: two stacked windows -->
    <rect x="154" y="92" width="62" height="54" rx="9" stroke-width="7" />
    <rect x="154" y="158" width="62" height="54" rx="9" stroke-width="7" />

  </g>
</svg>
